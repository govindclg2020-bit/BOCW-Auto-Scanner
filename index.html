<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOCW Worker Data Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 20px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; text-align: center; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; background: #f8f9fa; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .progress-container { background: #e0e0e0; border-radius: 10px; margin: 0 20px 20px 20px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); height: 25px; width: 0%; transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; }
        .search-section { padding: 20px; }
        .search-box { display: flex; gap: 15px; flex-wrap: wrap; margin: 15px 0; }
        .search-box input, .search-box select { padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; flex: 1; }
        .search-box button { padding: 12px 25px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .results-table { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 13px; }
        th { background: #667eea; color: white; }
        .admin-link { text-align: center; padding: 15px; background: #f8f9fa; font-size: 12px; }
        .admin-link a { color: #667eea; text-decoration: none; }
        @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔍 BOCW Worker Data Scanner</h1>
        <p>Auto Scanner | Permanent Storage | Search by ID/Aadhaar/Registration</p>
    </div>
    
    <div class="stats">
        <div class="stat-card"><div class="stat-value" id="currentId">-</div><div class="stat-label">Current ID</div></div>
        <div class="stat-card"><div class="stat-value" id="validCount">0</div><div class="stat-label">Workers Found</div></div>
        <div class="stat-card"><div class="stat-value" id="scannedCount">0</div><div class="stat-label">Scanned</div></div>
        <div class="stat-card"><div class="stat-value" id="progressPercent">0%</div><div class="stat-label">Progress</div></div>
    </div>
    
    <div class="progress-container"><div class="progress-bar" id="progressBar">0%</div></div>
    
    <div class="search-section">
        <h3>🔍 Search Worker</h3>
        <div class="search-box">
            <select id="searchType">
                <option value="id">User ID</option>
                <option value="aadhaar">Aadhaar Number</option>
                <option value="regNo">Registration No</option>
                <option value="name">Name</option>
            </select>
            <input type="text" id="searchValue" placeholder="Enter value...">
            <button id="searchBtn">Search</button>
            <button id="resetBtn">Reset</button>
        </div>
        <div class="results-table">
            <table id="dataTable"><thead><tr><th>ID</th><th>Name</th><th>Father</th><th>Aadhaar</th><th>Mobile</th><th>Reg No</th><th>District</th></tr></thead><tbody id="tableBody"><tr><td colspan="7">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
    
    <div class="admin-link"><a href="/admin" target="_blank">🔐 Admin Panel</a></div>
</div>

<script>
    let allWorkers = [];
    
    async function fetchStatus() {
        try {
            const res = await fetch('/api/status?t=' + Date.now());
            const data = await res.json();
            document.getElementById('currentId').innerHTML = data.current_id?.toLocaleString() || '-';
            document.getElementById('validCount').innerHTML = data.total_found?.toLocaleString() || '0';
            document.getElementById('scannedCount').innerHTML = data.scanned_count?.toLocaleString() || '0';
            const percent = data.progress || 0;
            document.getElementById('progressPercent').innerHTML = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressBar').textContent = percent + '%';
        } catch(e) {}
    }
    
    async function fetchData() {
        try {
            const res = await fetch('/api/data?t=' + Date.now());
            allWorkers = await res.json();
            displayTable(allWorkers);
            document.getElementById('validCount').innerHTML = allWorkers.length.toLocaleString();
        } catch(e) {}
    }
    
    function displayTable(data) {
        if (!data || data.length === 0) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="7">No data yet. Scanner is running...</td></tr>';
            return;
        }
        document.getElementById('tableBody').innerHTML = data.slice(0, 100).map(w => `
            <tr><td>${w.id}</td><td>${w.name}</td><td>${w.father}</td><td>${w.aadhaar}</td><td>${w.mobile}</td><td>${w.regNo}</td><td>${w.district}</td></tr>
        `).join('');
    }
    
    function search() {
        const type = document.getElementById('searchType').value;
        const value = document.getElementById('searchValue').value.trim().toLowerCase();
        if (!value) { displayTable(allWorkers); return; }
        
        let filtered = allWorkers.filter(w => {
            if (type === 'id') return w.id == value;
            if (type === 'aadhaar') return w.aadhaar && w.aadhaar.includes(value);
            if (type === 'regNo') return w.regNo && w.regNo.toLowerCase().includes(value);
            if (type === 'name') return w.name && w.name.toLowerCase().includes(value);
            return false;
        });
        displayTable(filtered);
    }
    
    document.getElementById('searchBtn').onclick = search;
    document.getElementById('resetBtn').onclick = () => { document.getElementById('searchValue').value = ''; displayTable(allWorkers); };
    
    setInterval(fetchStatus, 3000);
    setInterval(fetchData, 10000);
    fetchStatus();
    fetchData();
</script>
</body>
</html>
